name: Publicar frontend no GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "price-monitor-web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Preparar frontend
        env:
          API_URL: ${{ vars.API_URL }}
        run: |
          mkdir -p dist
          cp -R price-monitor-web/. dist/
          (cd price-monitor-chrome && zip -r ../dist/price-monitor-chrome.zip .)
          if [ -n "$API_URL" ]; then
            sed -i "s|https://sua-api.koyeb.app|$API_URL|g" dist/app.js
          fi

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Enviar artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
